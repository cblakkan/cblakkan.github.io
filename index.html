            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;

                font-size: 2rem;
                font-weight: 600;

            }

            a {
                display: inline-block;
                color: #111;
                text-decoration: none;
                font-size: 1rem;
                border-bottom: 1.5px solid #111;
                padding-bottom: 1px;
                transition: opacity 0.15s;
            }

            a:hover {
                opacity: 0.5;
            }
